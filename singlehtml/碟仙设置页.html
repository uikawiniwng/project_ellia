<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>艾莉亚 - 最终设定与通讯页</title>
<style>
  /* 基础重置与深色背景 */
  body {
    background: radial-gradient(circle at 50% 0%, #2b1338 0%, #0a0310 100%);
    color: #e5c7ff;
    font-family: 'Noto Serif SC', serif;
    margin: 0; 
    padding: 3rem;
    display: flex; 
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* =========================================
     外壳容器
     ========================================= */
  .ellia-v2-ticket-shell {
    display: flex; 
    gap: 2rem;
    width: 100%; 
    max-width: 950px; 
    background: rgba(15, 8, 22, 0.85);
    border: 1px solid rgba(155, 89, 182, 0.2);
    box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 60px rgba(202, 164, 93, 0.03);
    padding: 3rem 2.5rem 2rem 2.5rem; 
    border-radius: 4px; 
    position: relative;
    backdrop-filter: blur(12px);
  }

  /* 精工内层极细金框 */
  .ellia-inner-frame {
    position: absolute;
    inset: 14px; 
    border: 1px solid rgba(202, 164, 93, 0.25);
    pointer-events: none;
    z-index: 10;
  }

  /* 四角发光锚点 */
  .frame-dot {
    position: absolute; width: 4px; height: 4px;
    background: #caa45d; border-radius: 50%;
    box-shadow: 0 0 8px #caa45d, 0 0 15px rgba(202, 164, 93, 0.6);
  }
  .dot-tl { top: -2.5px; left: -2.5px; } .dot-tr { top: -2.5px; right: -2.5px; }
  .dot-bl { bottom: -2.5px; left: -2.5px; } .dot-br { bottom: -2.5px; right: -2.5px; }

  /* 顶部导航栏 */
  .nav-btn {
    position: absolute; top: 1.2rem; 
    background: transparent; border: none;
    color: rgba(224, 176, 255, 0.5);
    font-family: 'Noto Serif SC', serif; font-size: 0.8rem;
    letter-spacing: 0.1em; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 20; display: flex; align-items: center;
  }
  .nav-btn:hover { color: #caa45d; text-shadow: 0 0 8px rgba(202, 164, 93, 0.6); }
  .nav-btn-left { left: 2.5rem; } .nav-btn-right { right: 2.5rem; }
  .nav-btn-left:hover { transform: translateX(-4px); }
  .nav-btn-right:hover { transform: translateX(4px); }

  /* =========================================
     面板基础布局
     ========================================= */
  .ellia-pane-left { 
    flex: 1.1; 
    position: relative;
    padding-right: 2rem; 
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem; 
  }
  .ellia-pane-left::after {
    content: ""; position: absolute;
    right: -1rem; top: 2%; bottom: 2%; width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(224, 176, 255, 0.25), transparent);
  }
  
  .ellia-pane-right { 
    flex: 0.9; 
    padding-left: 1rem; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    margin-top: 1rem;
  }

  /* =========================================
     全局标题与常态选项按钮 (新式无底色发光风格)
     ========================================= */
  .settings-group {
    display: flex; flex-direction: column; gap: 0.5rem;
  }

  .ellia-v2-settings-title {
    color: rgba(202, 164, 93, 0.7); font-size: 0.75rem; 
    letter-spacing: 0.2em; text-transform: uppercase;
  }

  .ellia-v2-settings-options { 
    display: flex; flex-wrap: wrap; gap: 0.4rem; width: 100%;
  }

  .ellia-v2-settings-option {
    flex: 1 1 auto; 
    background: transparent; border: none;
    border-bottom: 1px solid rgba(224, 176, 255, 0.05);
    color: rgba(240, 220, 252, 0.5);
    padding: 0.6rem 0.5rem; font-size: 0.85rem;
    text-align: center; cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit; letter-spacing: 0.05em;
    position: relative; z-index: 20; 
  }
  .ellia-v2-settings-option:hover {
    color: #fff; text-shadow: 0 0 10px rgba(224, 176, 255, 0.8);
    border-bottom-color: rgba(224, 176, 255, 0.3);
  }
  .ellia-v2-settings-option.is-active {
    color: #caa45d; text-shadow: 0 0 15px rgba(202, 164, 93, 0.6);
    border-bottom: 1px solid rgba(202, 164, 93, 0.5);
    background: radial-gradient(ellipse at bottom, rgba(202, 164, 93, 0.15) 0%, transparent 60%);
  }
  .ellia-v2-settings-option.is-active::before { content: "✦ "; font-size: 0.7rem; margin-right: 4px;}
  .ellia-v2-settings-option.is-active::after { content: " ✦"; font-size: 0.7rem; margin-left: 4px;}

  /* 专属提问字色 */
  .title-curious {
    color: #e0b0ff;
    letter-spacing: 0.1em;
    text-transform: none;
  }

  /* =========================================
     右侧：碟仙信标 SVG 区域
     ========================================= */
  .planchette-wrapper {
    position: relative; width: 160px; height: 200px;
    margin-bottom: 1.5rem; z-index: 20;
    animation: mystic-float 6s ease-in-out infinite;
  }

  @keyframes mystic-float {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(2deg); filter: drop-shadow(0 10px 15px rgba(202, 164, 93, 0.2)); }
    100% { transform: translateY(0) rotate(0deg); }
  }

  .svg-planchette { width: 100%; height: 100%; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); }

  .ellia-v2-ticket-detail-title {
    font-size: 1.2rem; color: #caa45d;
    text-align: center; margin-bottom: 0.2rem;
    text-shadow: 0 0 12px rgba(202, 164, 93, 0.4);
    letter-spacing: 0.2em;
  }
  .ellia-v2-ticket-detail-subtitle {
    font-size: 0.65rem; color: rgba(224, 176, 255, 0.5);
    letter-spacing: 0.4em; text-transform: uppercase;
    margin-bottom: 2rem; 
  }

  .ellia-v2-flavor-text {
    font-size: 0.9rem; color: #e0b0ff; letter-spacing: 0.1em;
    margin-top: 1rem; text-shadow: 0 0 8px rgba(155, 89, 182, 0.6);
    text-align: center; line-height: 1.6;
  }

  .ellia-v2-ticket-detail-status {
    width: 90%; padding-top: 1rem; margin-top: 1.5rem;
    border-top: 1px solid rgba(202, 164, 93, 0.3);
    text-align: center; font-size: 0.75rem; color: #f1dcff; line-height: 1.8;
  }
</style>
</head>
<body>

  <div class="ellia-v2-ticket-shell">
    
    <button class="nav-btn nav-btn-left" onclick="console.log('返回')">← 返回索引</button>
    <button class="nav-btn nav-btn-right" onclick="console.log('下一页')">切换到下一页？</button>

    <div class="ellia-inner-frame">
      <div class="frame-dot dot-tl"></div><div class="frame-dot dot-tr"></div>
      <div class="frame-dot dot-bl"></div><div class="frame-dot dot-br"></div>
    </div>

    <div class="ellia-pane-left">
      
      <div style="font-size: 0.85rem; color: #e0b0ff; line-height: 1.6; text-align: justify; margin-bottom: 0.5rem; text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);">
        “哟！旅伴~这是最后的调整咯。<br>虽然弄了个类似碟仙的游标，但我可不想再玩什么占卜游戏了。这只是为了维持我们‘通讯’的小信标罢了。快看看还有什么需要顺手调一下的吧？”
      </div>

      <div class="settings-group">
        <div class="ellia-v2-settings-title">FONT STYLE / 字体</div>
        <div class="ellia-v2-settings-options">
          <button class="ellia-v2-settings-option font-btn is-active" onclick="selectOption(this, 'font-btn')">A / Sthginkra</button>
          <button class="ellia-v2-settings-option font-btn" onclick="selectOption(this, 'font-btn')">B / Yomeng</button>
          <button class="ellia-v2-settings-option font-btn" onclick="selectOption(this, 'font-btn')">C / 真楷</button>
          <button class="ellia-v2-settings-option font-btn" onclick="selectOption(this, 'font-btn')">D / Xiaolai</button>
          <button class="ellia-v2-settings-option font-btn" onclick="selectOption(this, 'font-btn')">E / 麦圆</button>
        </div>
      </div>

      <div class="settings-group">
        <div class="ellia-v2-settings-title">ENVIRONMENT ANIMATION / 环境动画</div>
        <div class="ellia-v2-settings-options">
          <button class="ellia-v2-settings-option anim-btn is-active" onclick="selectOption(this, 'anim-btn')">On</button>
          <button class="ellia-v2-settings-option anim-btn" onclick="selectOption(this, 'anim-btn')">Off</button>
        </div>
      </div>

      <div class="settings-group">
        <div class="ellia-v2-settings-title">TYPING SPEED / 打字速度</div>
        <div class="ellia-v2-settings-options">
          <button class="ellia-v2-settings-option speed-btn" onclick="selectOption(this, 'speed-btn')">Disable</button>
          <button class="ellia-v2-settings-option speed-btn is-active" onclick="selectOption(this, 'speed-btn')">Normal</button>
          <button class="ellia-v2-settings-option speed-btn" onclick="selectOption(this, 'speed-btn')">Fast</button>
        </div>
      </div>

      <div class="settings-group" style="margin-top: 0.5rem;">
        <div class="ellia-v2-settings-title title-curious">“您难道好奇我的面容？”</div>
        <div class="ellia-v2-settings-options">
          <button class="ellia-v2-settings-option face-btn" onclick="selectOption(this, 'face-btn')">是</button>
          <button class="ellia-v2-settings-option face-btn is-active" onclick="selectOption(this, 'face-btn')">不是</button>
        </div>
      </div>

    </div>

    <div class="ellia-pane-right">
      
      <div class="ellia-v2-ticket-detail-title">跨界信标</div>
      <div class="ellia-v2-ticket-detail-subtitle">SPIRIT ANCHOR</div>

      <div class="planchette-wrapper">
        <svg class="svg-planchette" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="planchetteGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#caa45d" stop-opacity="0.2"/>
              <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="planchetteBody" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#140a20" />
              <stop offset="100%" stop-color="#2a1640" />
            </linearGradient>
          </defs>

          <circle cx="100" cy="120" r="90" fill="url(#planchetteGlow)" />

          <g transform="translate(0, 10)">
            <path d="M 100 10 C 140 70, 180 130, 170 180 C 160 210, 40 210, 30 180 C 20 130, 60 70, 100 10 Z" 
                  fill="url(#planchetteBody)" stroke="#caa45d" stroke-width="2" stroke-opacity="0.8" />
            
            <path d="M 100 20 C 135 75, 170 130, 162 175 C 153 200, 47 200, 38 175 C 30 130, 65 75, 100 20 Z" 
                  fill="none" stroke="#caa45d" stroke-width="0.5" stroke-opacity="0.4" stroke-dasharray="3 3" />

            <path d="M 50 150 L 60 160 M 150 150 L 140 160 M 100 180 L 100 190" stroke="#caa45d" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="100" cy="40" r="2" fill="#caa45d" />

            <circle cx="100" cy="110" r="30" fill="#0a0310" stroke="#caa45d" stroke-width="1.5" />
            <circle cx="100" cy="110" r="38" fill="none" stroke="#caa45d" stroke-width="0.5" stroke-dasharray="2 4" />
            
            <path d="M 80 110 Q 100 95 120 110 Q 100 125 80 110 Z" fill="none" stroke="#e0b0ff" stroke-width="1.5" />
            <circle cx="100" cy="110" r="6" fill="#e0b0ff" filter="drop-shadow(0 0 5px #e0b0ff)" />
          </g>
        </svg>
      </div>

      <div class="ellia-v2-flavor-text">
        「 跨越维度的锚点，只为您传递真实 」<br>
        <span style="font-size: 0.75rem; color: rgba(224, 176, 255, 0.4);">它不再预示未来，只会安静地注视着您。</span>
      </div>
      
      <div class="ellia-v2-ticket-detail-status">
        基础设置已就绪<br>
        <span style="opacity:0.4;">所有选项均已同步至底层环境</span>
      </div>

    </div>
  </div>

  <script>
    function selectOption(element, groupClass) {
      const buttons = document.querySelectorAll('.' + groupClass);
      buttons.forEach(btn => btn.classList.remove('is-active'));
      element.classList.add('is-active');
    }
  </script>
</body>
</html>
