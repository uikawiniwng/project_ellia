<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>艾莉亚 - 技能美化测试 (优雅塔罗版 - 高度对齐)</title>
<style>
  /* 基础重置与深色背景 */
  body {
    background: radial-gradient(circle at 50% 0%, #2b1338 0%, #0a0310 100%);
    color: #e5c7ff;
    font-family: 'Noto Serif SC', serif;
    margin: 0; 
    padding: 3rem;
    display: flex; 
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* =========================================
     外壳容器
     ========================================= */
  .ellia-v2-ticket-shell {
    display: flex; 
    gap: 3rem;
    width: 100%; 
    max-width: 850px;
    background: rgba(15, 8, 22, 0.85);
    border: 1px solid rgba(155, 89, 182, 0.2);
    box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 60px rgba(202, 164, 93, 0.03);
    padding: 3.5rem 2.5rem 2.5rem 2.5rem; 
    border-radius: 4px; 
    position: relative;
    backdrop-filter: blur(12px);
  }

  /* 精工内层极细金框 */
  .ellia-inner-frame {
    position: absolute;
    inset: 14px; 
    border: 1px solid rgba(202, 164, 93, 0.25);
    pointer-events: none;
    z-index: 10;
  }

  /* 四角发光锚点 */
  .frame-dot {
    position: absolute;
    width: 4px; height: 4px;
    background: #caa45d;
    border-radius: 50%;
    box-shadow: 0 0 8px #caa45d, 0 0 15px rgba(202, 164, 93, 0.6);
  }
  .dot-tl { top: -2.5px; left: -2.5px; }
  .dot-tr { top: -2.5px; right: -2.5px; }
  .dot-bl { bottom: -2.5px; left: -2.5px; }
  .dot-br { bottom: -2.5px; right: -2.5px; }

  /* 顶部导航栏 */
  .nav-btn {
    position: absolute;
    top: 1.2rem; 
    background: transparent;
    border: none;
    color: rgba(224, 176, 255, 0.5);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 20;
    display: flex;
    align-items: center;
  }
  .nav-btn:hover {
    color: #caa45d;
    text-shadow: 0 0 8px rgba(202, 164, 93, 0.6);
  }
  .nav-btn-left { left: 2.5rem; }
  .nav-btn-right { right: 2.5rem; }
  .nav-btn-left:hover { transform: translateX(-4px); }
  .nav-btn-right:hover { transform: translateX(4px); }

  /* =========================================
     左侧：设置面板
     ========================================= */
  .ellia-pane-left { 
    flex: 1; 
    position: relative;
    padding-right: 1.5rem; 
    margin-top: 0.5rem; 
  }
  .ellia-pane-left::after {
    content: "";
    position: absolute;
    right: -1.5rem; 
    top: 5%; bottom: 5%; width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(224, 176, 255, 0.25), transparent);
  }
  .ellia-v2-settings-title {
    color: rgba(202, 164, 93, 0.7); 
    font-size: 0.8rem; 
    letter-spacing: 0.3em;
    margin-bottom: 1.2rem; 
    text-align: center;
  }
  .ellia-v2-settings-options { 
    display: flex; flex-direction: column; gap: 0.4rem; 
  }
  .ellia-v2-settings-option {
    background: transparent; border: none;
    border-bottom: 1px solid rgba(224, 176, 255, 0.05);
    color: rgba(240, 220, 252, 0.6);
    padding: 0.8rem 1rem; font-size: 0.95rem;
    text-align: center; cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit; letter-spacing: 0.05em;
    position: relative; z-index: 20; 
  }
  .ellia-v2-settings-option:hover {
    color: #fff; text-shadow: 0 0 10px rgba(224, 176, 255, 0.8);
    border-bottom-color: rgba(224, 176, 255, 0.3);
  }
  .ellia-v2-settings-option.is-active {
    color: #caa45d; text-shadow: 0 0 15px rgba(202, 164, 93, 0.6);
    border-bottom: 1px solid rgba(202, 164, 93, 0.5);
    background: radial-gradient(ellipse at bottom, rgba(202, 164, 93, 0.15) 0%, transparent 60%);
  }
  .ellia-v2-settings-option.is-active::before { content: "✦ "; font-size: 0.75rem; margin-right: 4px;}
  .ellia-v2-settings-option.is-active::after { content: " ✦"; font-size: 0.75rem; margin-left: 4px;}
  .quick-reply-btn:active { background: rgba(224, 176, 255, 0.1); }
  .ellia-divider {
    height: 1px; width: 100%; margin: 2rem 0;
    background: linear-gradient(90deg, transparent, rgba(224, 176, 255, 0.25), transparent);
  }

  /* =========================================
     右侧：塔罗牌面板
     ========================================= */
  .ellia-pane-right { 
    flex: 1; padding-left: 1.5rem; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    perspective: 1200px; margin-top: 0.5rem;
  }
  .ellia-v2-ticket-detail-title {
    font-size: 1.2rem; color: #caa45d;
    text-align: center; margin-bottom: 0.2rem;
    text-shadow: 0 0 12px rgba(202, 164, 93, 0.4);
    letter-spacing: 0.2em;
  }
  .ellia-v2-ticket-detail-subtitle {
    font-size: 0.65rem; color: rgba(224, 176, 255, 0.5);
    letter-spacing: 0.4em; text-transform: uppercase;
    margin-bottom: 1rem; /* 减小标题与下方内容的间距 */
  }

  /* 抽牌结果展示区 */
  .ellia-v2-drawn-card {
    font-size: 1.15rem; color: #ffeba1; 
    letter-spacing: 0.1em;
    margin-bottom: 1rem; /* 减小间距 */
    text-shadow: 0 0 12px rgba(202, 164, 93, 0.8);
    font-weight: bold; text-align: center; 
    min-height: 28px; 
    transition: opacity 0.4s ease, color 0.4s ease, text-shadow 0.4s ease;
  }

  /* 塔罗牌容器 (缩小尺寸以对齐水晶球高度) */
  .tarot-wrapper {
    position: relative;
    width: 120px; /* 从160缩小 */
    height: 200px; /* 从260缩小 */
    margin-bottom: 1.2rem; /* 减小间距 */
    cursor: pointer; z-index: 20;
    transform-style: preserve-3d;
    transition: transform 0.4s ease;
  }
  
  .tarot-wrapper:hover {
    transform: translateY(-4px);
  }

  .tarot-wrapper.is-drawing {
    animation: elegant-draw 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  @keyframes elegant-draw {
    0% { transform: translateY(0) rotateY(0deg); }
    50% { transform: translateY(-15px) rotateY(180deg) scale(1.02); }
    100% { transform: translateY(0) rotateY(360deg) scale(1); }
  }

  /* SVG 塔罗牌本体 */
  .svg-tarot {
    width: 100%; height: 100%;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
  }

  /* 底部文字描述区 */
  .flip-card-container {
    width: 100%; transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
    display: flex; flex-direction: column; align-items: center;
  }
  .flip-card-container.is-turning { transform: rotateX(90deg) scale(0.95); opacity: 0; }
  
  .ellia-v2-flavor-text {
    font-size: 1rem; color: #e0b0ff; letter-spacing: 0.1em;
    margin-bottom: 1rem; text-shadow: 0 0 8px rgba(155, 89, 182, 0.6);
    text-align: center; height: 24px;
  }
  
  .ellia-v2-ticket-detail-status {
    width: 90%; padding-top: 1rem;
    border-top: 1px solid rgba(202, 164, 93, 0.3);
    text-align: center; font-size: 0.8rem; color: #f1dcff; line-height: 1.8;
  }
  .glow-text {
    color: #caa45d; text-shadow: 0 0 8px rgba(202, 164, 93, 0.8);
    font-weight: bold; padding: 0 4px;
  }
</style>
</head>
<body>

  <div class="ellia-v2-ticket-shell">
    
    <button class="nav-btn nav-btn-left" onclick="console.log('返回索引被点击')">← 返回索引</button>
    <button class="nav-btn nav-btn-right" onclick="console.log('翻到下一页被点击')">翻到下一页 →</button>

    <div class="ellia-inner-frame">
      <div class="frame-dot dot-tl"></div><div class="frame-dot dot-tr"></div>
      <div class="frame-dot dot-bl"></div><div class="frame-dot dot-br"></div>
    </div>

    <div class="ellia-pane-left">
      <div class="ellia-v2-settings-title">SECOND SKILL SLOT</div>
      <div class="ellia-v2-settings-options" id="skillGroup">
        <button class="ellia-v2-settings-option" onclick="triggerAction(this, 'skill_off', false)">关闭技能 2</button>
        <button class="ellia-v2-settings-option is-active" onclick="triggerAction(this, 'skill_more', false)">不止于此</button>
        <button class="ellia-v2-settings-option" onclick="triggerAction(this, 'skill_step', false)">步履不停/瓮、星屑、步伐</button>
      </div>

      <div class="ellia-divider"></div>

      <div class="ellia-v2-settings-title">QUICK REPLY</div>
      <div class="ellia-v2-settings-options">
        <button class="ellia-v2-settings-option quick-reply-btn" onclick="triggerAction(this, 'qr_journal', true)">拼缀手账</button>
      </div>
    </div>

    <div class="ellia-pane-right">
      <div class="ellia-v2-ticket-detail-title">命运塔罗</div>
      <div class="ellia-v2-ticket-detail-subtitle">Tarot of Fate</div>
      
      <div class="ellia-v2-drawn-card" id="drawnCardResult" style="opacity: 0;">
        [ 等待抽取 ]
      </div>

      <div class="tarot-wrapper" id="tarotCard" onclick="drawTarotCard()">
        <svg class="svg-tarot" viewBox="0 0 180 300" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#1b0e29"/>
              <stop offset="50%" stop-color="#2a1640"/>
              <stop offset="100%" stop-color="#0f0717"/>
            </linearGradient>
            <radialGradient id="cardGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#caa45d" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <rect x="5" y="5" width="170" height="290" rx="10" fill="url(#cardBg)" stroke="#11081a" stroke-width="2"/>
          <rect x="5" y="5" width="170" height="290" rx="10" fill="url(#cardGlow)"/>
          <rect x="15" y="15" width="150" height="270" rx="6" fill="none" stroke="#caa45d" stroke-width="1.5" stroke-opacity="0.6"/>
          <rect x="20" y="20" width="140" height="260" rx="4" fill="none" stroke="#caa45d" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="3 3"/>
          
          <g transform="translate(90, 150)">
            <circle cx="0" cy="0" r="40" fill="none" stroke="#caa45d" stroke-width="1" stroke-opacity="0.8"/>
            <circle cx="0" cy="0" r="50" fill="none" stroke="#caa45d" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 4"/>
            <path d="M0,-55 L15,-15 L55,0 L15,15 L0,55 L-15,15 L-55,0 L-15,-15 Z" fill="none" stroke="#e5c7ff" stroke-width="0.5" stroke-opacity="0.5"/>
            <path d="M-22,0 Q0,-18 22,0 Q0,18 -22,0 Z" fill="none" stroke="#caa45d" stroke-width="1.5"/>
            <circle cx="0" cy="0" r="7" fill="#caa45d" opacity="0.8"/>
            <circle cx="0" cy="0" r="2.5" fill="#1b0e29"/>
          </g>
          
          <path d="M70,35 L90,25 L110,35 M90,25 L90,45" fill="none" stroke="#caa45d" stroke-width="1" stroke-opacity="0.5"/>
          <path d="M70,265 L90,275 L110,265 M90,275 L90,255" fill="none" stroke="#caa45d" stroke-width="1" stroke-opacity="0.5"/>
        </svg>
      </div>
      
      <div class="flip-card-container" id="dynamicContentCard">
        <div class="ellia-v2-flavor-text" id="displayText">
          「 命运的歧路，在此延伸出无限可能 」
        </div>
        
        <div class="ellia-v2-ticket-detail-status">
          当前已启用 <span class="glow-text" id="displayStatus">不止于此</span><br>
          <span style="opacity:0.4; font-size:0.7rem;">设定将保存为聊天变量供 EJS 读取</span>
        </div>
      </div>
    </div>

  </div>

  <script>
    const contentMap = {
      'skill_off': { text: '「 塔罗牌静止，命运的齿轮停滞 」', status: '关闭技能 2' },
      'skill_more': { text: '「 命运的歧路，在此延伸出无限可能 」', status: '不止于此' },
      'skill_step': { text: '「 踏下足迹，收集散落于星海的碎片 」', status: '步履不停/瓮、星屑、步伐' }
    };

    function triggerAction(element, actionKey, isQuickReply) {
      if (isQuickReply) return; 
      
      const skillButtons = document.getElementById('skillGroup').querySelectorAll('.ellia-v2-settings-option');
      skillButtons.forEach(btn => btn.classList.remove('is-active'));
      element.classList.add('is-active');

      const card = document.getElementById('dynamicContentCard');
      const textEl = document.getElementById('displayText');
      const statusEl = document.getElementById('displayStatus');
      const drawnCardEl = document.getElementById('drawnCardResult');

      card.classList.add('is-turning');

      setTimeout(() => {
        const newData = contentMap[actionKey];
        if(newData) {
            textEl.innerText = newData.text;
            statusEl.innerText = newData.status;
            drawnCardEl.style.opacity = 0; // 切换技能时重置结果
        }
      }, 300);

      setTimeout(() => {
        card.classList.remove('is-turning');
      }, 400);
    }

    const tarotPool = [
      "【 0. 愚者 The Fool 】",
      "【 I. 魔术师 The Magician 】",
      "【 II. 女祭司 The High Priestess 】",
      "【 III. 女皇 The Empress 】",
      "【 IV. 皇帝 The Emperor 】",
      "【 V. 教皇 The Hierophant 】",
      "【 VI. 恋人 The Lovers 】",
      "【 VII. 战车 The Chariot 】",
      "【 VIII. 力量 Strength 】",
      "【 IX. 隐士 The Hermit 】",
      "【 X. 命运之轮 Wheel of Fortune 】",
      "【 XI. 正义 Justice 】",
      "【 XII. 倒吊人 The Hanged Man 】",
      "【 XIII. 死神 Death 】",
      "【 XIV. 节制 Temperance 】",
      "【 XV. 恶魔 The Devil 】",
      "【 XVI. 高塔 The Tower 】",
      "【 XVII. 星星 The Star 】",
      "【 XVIII. 月亮 The Moon 】",
      "【 XIX. 太阳 The Sun 】",
      "【 XX. 审判 Judgement 】",
      "【 XXI. 世界 The World 】",
      "【 隐藏款：河马 The Hippo 🦛 】"
    ];

    function drawTarotCard() {
      const tarotWrapper = document.getElementById('tarotCard');
      const drawnCardEl = document.getElementById('drawnCardResult');
      
      if(tarotWrapper.classList.contains('is-drawing')) return;

      tarotWrapper.classList.add('is-drawing');
      drawnCardEl.style.opacity = 0; 

      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * tarotPool.length);
        const result = tarotPool[randomIndex];
        
        drawnCardEl.innerText = result;
        
        if(result.includes("河马")) {
          drawnCardEl.style.color = "#ffb6c1"; 
          drawnCardEl.style.textShadow = "0 0 12px rgba(255, 105, 180, 0.8)";
        } else {
          drawnCardEl.style.color = "#ffeba1"; 
          drawnCardEl.style.textShadow = "0 0 12px rgba(202, 164, 93, 0.8)";
        }
        
        drawnCardEl.style.opacity = 1;
      }, 400);

      setTimeout(() => {
        tarotWrapper.classList.remove('is-drawing');
      }, 800);
    }
  </script>
</body>
</html>
